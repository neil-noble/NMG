name: Daily Fuel Export

on:
  schedule:
    - cron: '0 21 * * *'  # 7am AWST (UTC+8) = 21:00 UTC previous day
  workflow_dispatch:       # Allow manual trigger from GitHub

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install requests

      - name: Run daily export
        env:
          SMARTFILL_CLIENT_REF: ${{ secrets.SMARTFILL_CLIENT_REF }}
          SMARTFILL_CLIENT_SECRET: ${{ secrets.SMARTFILL_CLIENT_SECRET }}
        run: python daily_export_github.py

      - name: Generate dashboard HTML
        env:
          SMARTFILL_CLIENT_REF: ${{ secrets.SMARTFILL_CLIENT_REF }}
          SMARTFILL_CLIENT_SECRET: ${{ secrets.SMARTFILL_CLIENT_SECRET }}
        run: python generate_fuel_dashboard.py

      - name: Commit and push CSV files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "Daily fuel export $(date +'%d/%m/%Y')"
          git push

      - name: Publish dashboard to nmg-fuel-site
        run: |
          git clone https://x-access-token:${{ secrets.PAGES_TOKEN }}@github.com/neil-noble/nmg-fuel-site.git /tmp/nmg-fuel-site
          cp docs/index.html /tmp/nmg-fuel-site/index.html
          cd /tmp/nmg-fuel-site
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --staged --quiet || (
            git commit -m "Update fuel dashboard $(date -u +'%Y-%m-%d %H:%M UTC')" &&
            git push
          )
